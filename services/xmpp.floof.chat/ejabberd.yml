hosts:
  - floof.chat
  - xmpp.floof.chat

loglevel: info

certfiles:
  - /home/ejabberd/certs/floof.chat_ecc/fullchain.cer
  - /home/ejabberd/certs/floof.chat_ecc/floof.chat.key

listen:
  - port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls_required: true

  - port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288

  - port: 5443
    ip: "::"
    module: ejabberd_http
    tls: true
    request_handlers:
      /admin: ejabberd_web_admin
      /bosh: mod_bosh
      /ws: ejabberd_http_ws
      /upload: mod_http_upload
      /invites: mod_invites
      /share: mod_http_fileserver

s2s_use_starttls: required

default_db: sql
sql_type: sqlite
sql_database: /home/ejabberd/database/ejabberd.db
update_sql_schema: true

acl:
  admin:
    user: lark@floof.chat
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - ::1/128

access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  announce:
    allow: admin
  configure:
    allow: admin
  muc_create:
    allow: local
  pubsub_createnode:
    allow: local
  trusted_network:
    allow: loopback
  register:
    allow: all

shaper:
  normal:
    rate: 3000
    burst_size: 20000
  fast: 100000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all
  s2s_shaper: fast

modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_announce:
    access: announce
  mod_avatar: {}
  mod_blocking: {}
  mod_bosh: {}
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  mod_fail2ban: {}
  mod_http_upload:
    put_url: https://xmpp.floof.chat:5443/upload
    docroot: /home/ejabberd/upload
    max_size: 104857600
    custom_headers:
      "Access-Control-Allow-Origin": "https://@HOST@"
      "Access-Control-Allow-Methods": "GET, HEAD, PUT, OPTIONS"
      "Access-Control-Allow-Headers": "Content-Type"
  mod_last: {}
  mod_mam:
    assume_mam_usage: true
    default: always
  mod_muc:
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    default_room_options:
      mam: true
      persistent: true
      public: false
      public_list: false
  mod_muc_admin: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_proxy65:
    access: local
    max_connections: 5
  mod_pubsub:
    access_createnode: pubsub_createnode
    plugins:
      - flat
      - pep
    force_node_config:
      storage:bookmarks:
        access_model: whitelist
  mod_push: {}
  mod_push_keepalive: {}
  mod_http_fileserver:
    docroot:
      /share: /home/ejabberd/share
  mod_invites:
    access_create_account: configure
    landing_page: https://xmpp.floof.chat:5443/invites/{{ invite.token }}
    site_name: floof.chat
    token_expire_seconds: 604800
  mod_register:
    access: register
    allow_modules:
      - mod_invites
    registration_watchers:
      - lark@floof.chat
    welcome_message:
      subject: "Welcome to floof.chat!"
      body: >
        Welcome to floof.chat! If you have any questions, message Lark
        (lark@floof.chat).
  mod_roster:
    versioning: true
  mod_s2s_dialback: {}
  mod_shared_roster: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_stun_disco: {}
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false
