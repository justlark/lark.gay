name: "Build ejabberd"

on:
  push:
    branches:
      - main
    paths:
      - "services/xmpp.floof.chat/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/justlark/ejabberd-floof
  UPSTREAM: ghcr.io/processone/ejabberd:latest

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Check upstream digest"
        if: github.event_name == 'schedule'
        id: check
        run: |
          upstream_digest=$(docker manifest inspect "$UPSTREAM" -v \
            | jq -r 'if type == "array" then .[0].Descriptor.digest else .Descriptor.digest end')

          our_digest=$(docker manifest inspect "$IMAGE:latest" -v 2>/dev/null \
            | jq -r '.config.Labels["org.opencontainers.image.base.digest"] // empty') || true

          if [ "$upstream_digest" = "$our_digest" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "upstream_digest=$upstream_digest" >> "$GITHUB_OUTPUT"

      - name: "Checkout"
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: "Log in to GHCR"
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push"
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: services/xmpp.floof.chat
          file: services/xmpp.floof.chat/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.base.digest=${{ steps.check.outputs.upstream_digest || '' }}
